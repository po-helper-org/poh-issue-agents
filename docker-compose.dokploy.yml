# Продакшн-вариант compose для self-hosted развёртывания (Dokploy).
# Пошаговая инструкция — docs/DEPLOY-DOKPLOY.md.
#
# Temporal НЕ поднимается здесь: сервис ходит в централизованный Temporal
# в инфраструктуре по TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE из .env
# (Dokploy → Environment). Postgres/temporal/temporal-ui выведены из этого
# файла целиком — их держит централизованный кластер.
#
# Отличия от docker-compose.yml (локальная разработка):
#
# 1. Наружу не публикуется ни один порт. Единственная публичная точка — webhook,
#    и он попадает наружу через Traefik самого Dokploy, с TLS.
#
# 2. Нет bind-монтирования prompts/config/workspace из каталога репозитория:
#    Dokploy очищает этот каталог при автодеплое. Файлы запечены в образ
#    воркера (см. worker/Dockerfile).
#
# 3. restart-политика у всех сервисов.

services:
  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    restart: unless-stopped
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (централизованный Temporal).
    env_file: .env
    expose:
      - "3000"
    # dokploy-network — чтобы Traefik видел этот контейнер. Указав сеть явно,
    # compose перестаёт добавлять default сам, поэтому он перечислен здесь.
    networks:
      - default
      - dokploy-network

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (централизованный Temporal).
    env_file: .env
    environment:
      # Небуферизованный вывод: строки [DRY_RUN] и ошибки видны в логах
      # Dokploy сразу, а не через несколько минут блочным сбросом.
      - PYTHONUNBUFFERED=1

networks:
  dokploy-network:
    external: true
