# Веса и пороги приоритизации issue.
# Формула (см. scripts/priority/score.py):
#   score = (impact + time_criticality + risk_reduction) * okr_multiplier / effort
#
# Все компоненты, кроме okr_multiplier, извлекаются LLM по шкале 1-5
# (эффект/срочность/снижение риска) и 1-10 (трудозатраты).
# Меняя пороги здесь — не трогаешь промпт и не трогаешь код скоринга.

[okr_multiplier]
# issue не связан ни с одним активным OKR текущего квартала
unrelated = 0.5
# issue поддерживает OKR, но не входит в топ-приоритеты
supports_okr = 1.0
# issue напрямую служит топ-приоритетному key result квартала
direct_top_priority = 1.5

[thresholds]
# score >= p0_min -> P0 (немедленно)
p0_min = 3.0
# score >= p1_min -> P1 (ближайший спринт)
p1_min = 1.8
# score >= p2_min -> P2 (в бэклоге, плановая очередь)
p2_min = 0.9
# ниже p2_min -> P3 (низкий приоритет, ресурсы не выделяются автоматически)

[bug_severity_override]
# Критичные баги обходят формулу целиком — не расчёт, а правило.
# Критично = потеря данных, финансовые потери, утечка/уязвимость безопасности,
# полная недоступность продуктивного сервиса.
critical_forces_priority = "P0"
