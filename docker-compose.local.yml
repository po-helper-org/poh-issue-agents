# local — полный стек для локальной разработки. Самодостаточный:
#   docker compose -f docker-compose.local.yml up -d   (или make up-local)
#
# Поднимает ЛОКАЛЬНЫЙ Temporal (postgres + temporal + temporal-ui) и приложение,
# настроенное на него. Порты Temporal (7233) и UI (8080) опубликованы наружу —
# удобно для отладки. Промпты/config/workspace монтируются из репозитория, чтобы
# правки были видны без пересборки образа. .env для Temporal править не нужно —
# адрес/namespace заданы здесь.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.24
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    ports:
      - "7233:7233"
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.31.2
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080
    ports:
      - "8080:8080"
    depends_on:
      - temporal

  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
    ports:
      - "3000:3000"
    depends_on:
      - temporal

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_NAMESPACE=default
      - PYTHONUNBUFFERED=1
    # Temporal auto-setup создаёт namespace `default` через пару секунд ПОСЛЕ
    # старта контейнера temporal; depends_on ждёт только запуск, не готовность.
    # Перезапускаемся, пока namespace не появится и worker не подключится.
    restart: unless-stopped
    volumes:
      - ./prompts:/app/prompts:ro
      - ./config:/app/config:ro
      - ./workspace:/app/workspace
    depends_on:
      - temporal

volumes:
  pgdata:
