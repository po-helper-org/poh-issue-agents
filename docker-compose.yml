# main — основной стек: только приложение (webhook + worker).
# Temporal ВНЕШНИЙ: адрес и namespace из .env (TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE).
# Инфраструктуры (postgres / temporal / temporal-ui) здесь нет — `docker compose up`
# не поднимает ни одного лишнего контейнера.
#
# Другие конфигурации:
#   docker-compose.local.yml — полный стек для локальной разработки (make up-local)
#   docker-compose.full.yml  — полный стек для прода со встроенным Temporal
services:
  # Принимает вебхуки GitHub, транслирует их в старт/сигналы Temporal-workflow.
  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    restart: unless-stopped
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (внешний Temporal).
    env_file: .env
    # Хост-порт настраивается через WEBHOOK_PORT (внутри контейнера всегда 3000).
    # Нужно, когда 3000 на хосте уже занят (Dokploy: "port is already allocated").
    ports:
      - "${WEBHOOK_PORT:-3000}:3000"

  # Исполняет сам workflow и все activities (LLM-вызовы через GLM,
  # gh CLI, claude -p для po-helper/SA-helper, deb8flow).
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (внешний Temporal).
    env_file: .env
    environment:
      # Unbuffered stdio so [DRY_RUN] / INFO logs flush to `docker logs`
      # immediately instead of sitting in a block buffer in the long-lived
      # worker process.
      - PYTHONUNBUFFERED=1
