# Только приложение: webhook + worker. Temporal — ВНЕШНИЙ, его адрес и
# namespace приходят из .env (TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE).
# Инфраструктуры (postgres / temporal / temporal-ui) здесь нет намеренно —
# `docker compose up` не поднимает ни одного лишнего контейнера.
#
# Нужен локальный Temporal для офлайн-разработки? Наложи override-файл:
#   docker compose -f docker-compose.yml -f docker-compose.local.yml up -d
services:
  # Принимает вебхуки GitHub, транслирует их в старт/сигналы Temporal-workflow.
  webhook:
    build:
      context: .
      dockerfile: webhook/Dockerfile
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (внешний Temporal).
    env_file: .env
    ports:
      - "3000:3000"

  # Исполняет сам workflow и все activities (LLM-вызовы через GLM,
  # gh CLI, claude -p для po-helper/SA-helper, deb8flow).
  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    # TEMPORAL_ADDRESS / TEMPORAL_NAMESPACE берутся из .env (внешний Temporal).
    env_file: .env
    environment:
      # Unbuffered stdio so [DRY_RUN] / INFO logs flush to `docker logs`
      # immediately instead of sitting in a block buffer in the long-lived
      # worker process.
      - PYTHONUNBUFFERED=1
    # Внешний Temporal на старте может быть временно недоступен (сеть/allowlist),
    # а выделенный namespace должен существовать. Перезапускаемся до коннекта.
    restart: unless-stopped
    volumes:
      - ./prompts:/app/prompts:ro
      - ./config:/app/config:ro
      - ./workspace:/app/workspace
